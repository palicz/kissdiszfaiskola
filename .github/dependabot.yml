version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    # @payloadcms/next peer: next ">=15.4.11 <15.5.0" — automatikus 15.5+ bump törné a peer dep-et
    ignore:
      - dependency-name: 'next'
        update-types:
          - 'version-update:semver-minor'
          - 'version-update:semver-major'
    groups:
      npm-dependencies:
        patterns:
          - '*'
        # Külön PR-ekben frissüljenek — a nagy csoportos bump könnyen szétcsúsztatja a next lint / flat config párost (pl. „circular structure to JSON”).
        exclude-patterns:
          - 'eslint*'
          - '@eslint/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - '*'
