version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    # @payloadcms/next peers allow next >=15.5.x; auto-bumping minor/major
    # risks breaking the peer constraint. Bump manually after verifying
    # compatibility with the Payload release notes.
    ignore:
      - dependency-name: 'next'
        update-types:
          - 'version-update:semver-minor'
          - 'version-update:semver-major'
    groups:
      npm-dependencies:
        patterns:
          - '*'
        # ESLint ecosystem updates are excluded from the bulk group to avoid
        # circular-structure-to-JSON and flat-config compatibility issues.
        exclude-patterns:
          - 'eslint*'
          - '@eslint/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - '*'
