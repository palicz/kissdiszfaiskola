name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format
        run: pnpm run format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Unit tests (with coverage)
        run: pnpm run test:unit

  integration:
    name: Integration (Payload + Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Not production: allows Drizzle dev schema push on first connect (empty DB has no tables yet).
      # Incremental migrations alone cannot bootstrap a fresh database; production uses migrate on deploy.
      NODE_ENV: test
      POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/ci_test
      PAYLOAD_SECRET: ci-github-actions-payload-secret-not-for-production
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Integration tests
        run: pnpm run test:int

  e2e:
    name: E2E (Playwright)
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Same as integration job: not production so Drizzle can push schema on first Payload connect.
      # `pnpm build` runs `payload migrate` first; migrate expects core tables, so we bootstrap below.
      # See tests/int/README.md.
      NODE_ENV: test
      CI: true
      POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/ci_test
      PAYLOAD_SECRET: ci-github-actions-payload-secret-not-for-production
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      CRON_SECRET: ci-github-actions-cron-secret-not-for-production
      PREVIEW_SECRET: ci-github-actions-preview-secret-not-for-production
      PLAYWRIGHT_WEB_SERVER_SILENCE: '1'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Bootstrap Postgres schema (Drizzle push)
        run: pnpm run ci:bootstrap-postgres

      - name: Build
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: E2E tests
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
